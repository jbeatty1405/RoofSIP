name: Storm weather cron

# Vercel Hobby only triggers native crons ~once/day, which is far too slow for a
# storm-response product. GitHub Actions is the authoritative hourly scheduler:
# it hits the CRON_SECRET-gated /api/cron/weather endpoint, which checks NOAA
# alerts and sends storm SMS to homeowners. workflow_dispatch allows manual runs.
on:
  schedule:
    - cron: '0 * * * *' # top of every hour, UTC (GitHub may delay a few minutes)
  workflow_dispatch:

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Hit storm cron endpoint
        run: |
          code=$(curl -sS -o /tmp/out.txt -w '%{http_code}' \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            https://roofsip.vercel.app/api/cron/weather)
          echo "HTTP $code"
          cat /tmp/out.txt
          echo
          test "$code" = "200"

          # A 200 is NOT proof the monitor is watching. If a ZIP can't be
          # geocoded we cannot see storms there, and the run would otherwise
          # look identical to "clear skies". Fail loudly so GitHub emails us.
          blind=$(python3 -c "import json;print(json.load(open('/tmp/out.txt')).get('zips_blind',0))")
          if [ "$blind" != "0" ]; then
            echo "::error::Storm monitor is BLIND on $blind ZIP(s) — storms there cannot be detected."
            exit 1
          fi
